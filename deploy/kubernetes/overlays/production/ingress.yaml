apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scoutx-web
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - scoutx.example.com
      secretName: scoutx-tls-prod
  rules:
    - host: scoutx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scoutx-web
                port:
                  number: 80
